name: Push Supabase Migrations

on:
  push:
    branches: [master]
    paths:
      - "supabase/migrations/**"
    tags:
      - "v*.*.*"  
  workflow_dispatch:
    inputs:                                                               
      target:   
        type: choice
        options: [Staging, Production]
        default: Staging  
jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ startsWith(github.ref, 'refs/tags/v') && 'Production' || (github.event.inputs.target || 'Staging') }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref "$PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      - run: supabase db push --password "$DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
